name: Mise a jour des cours

on:
  schedule:
    - cron: '0 6 * * 1-5'   # tous les jours ouvres a 06:00 UTC
  workflow_dispatch:          # bouton "Run workflow" manuel
  push:
    branches: [ main ]
    paths: [ 'scripts/fetch_data.py' ]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependances
        run: pip install -r requirements.txt

      - name: Recuperer les cours
        run: python scripts/fetch_data.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "maj cours $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
